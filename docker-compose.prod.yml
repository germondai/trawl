services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.39.0
    restart: always
    volumes:
      - dragonfly_data:/data

  trawl:
    image: ghcr.io/germondai/trawl:latest
    restart: always
    ports:
      - "${PORT:-8191}:8191"
    shm_size: 1gb
    mem_limit: 3g
    environment:
      REDIS_URL: redis://dragonfly:6379
      BROWSER_POOL_SIZE: 5
    depends_on:
      - dragonfly
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  dragonfly_data:
